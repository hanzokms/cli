builds:
  - id: windows-build
    env:
      - CGO_ENABLED=0
    binary: kms
    ldflags:
      - -X github.com/hanzokms/cli/packages/util.CLI_VERSION={{ .Version }}
      - -X github.com/hanzokms/cli/packages/telemetry.POSTHOG_API_KEY_FOR_CLI={{ .Env.POSTHOG_API_KEY_FOR_CLI }}
    flags:
      - -trimpath
    goos:
      - windows
    goarch:
      - amd64

dockers:
  - dockerfile: docker/windows/windows-server-2022
    goos: windows
    goarch: amd64
    ids:
      - windows-build
    image_templates:
      - "hanzokms/cli:{{ .Major }}.{{ .Minor }}.{{ .Patch }}-windows-server-2022-amd64"
      - "hanzokms/cli:latest-windows-server-2022-amd64"
  - dockerfile: docker/windows/windows-server-2019
    goos: windows
    goarch: amd64
    ids:
      - windows-build
    image_templates:
      - "hanzokms/cli:{{ .Major }}.{{ .Minor }}.{{ .Patch }}-windows-server-2019-amd64"
      - "hanzokms/cli:latest-windows-server-2019-amd64"

docker_manifests:
  # Versioned
  - name_template: "hanzokms/cli:{{ .Major }}.{{ .Minor }}.{{ .Patch }}-windows-amd64"
    image_templates:
      - "hanzokms/cli:{{ .Major }}.{{ .Minor }}.{{ .Patch }}-windows-server-2022-amd64"
      - "hanzokms/cli:{{ .Major }}.{{ .Minor }}.{{ .Patch }}-windows-server-2019-amd64"

  # Latest
  - name_template: "hanzokms/cli:latest-windows-amd64"
    image_templates:
      - "hanzokms/cli:latest-windows-server-2022-amd64"
      - "hanzokms/cli:latest-windows-server-2019-amd64"
