# GoReleaser config for Hanzo KMS CLI
before:
  hooks:
    - ./scripts/completions.sh
    - ./scripts/manpages.sh

builds:
  - id: darwin-build
    binary: kms
    ldflags:
      - -X github.com/hanzokms/cli/packages/util.CLI_VERSION={{ .Version }}
      - -X github.com/hanzokms/cli/packages/telemetry.POSTHOG_API_KEY_FOR_CLI={{ .Env.POSTHOG_API_KEY_FOR_CLI }}
    flags:
      - -trimpath
    env:
      - CGO_ENABLED=1
      - CC=/home/runner/work/osxcross/target/bin/o64-clang
      - CXX=/home/runner/work/osxcross/target/bin/o64-clang++
    goos:
      - darwin
    ignore:
      - goos: darwin
        goarch: "386"

  - id: all-other-builds
    env:
      - CGO_ENABLED=0
    binary: kms
    ldflags:
      - -X github.com/hanzokms/cli/packages/util.CLI_VERSION={{ .Version }}
      - -X github.com/hanzokms/cli/packages/telemetry.POSTHOG_API_KEY_FOR_CLI={{ .Env.POSTHOG_API_KEY_FOR_CLI }}
    flags:
      - -trimpath
    goos:
      - freebsd
      - linux
      - netbsd
      - openbsd
      - windows
    goarch:
      - "386"
      - amd64
      - arm
      - arm64
    goarm:
      - "6"
      - "7"
    ignore:
      - goos: windows
        goarch: "386"
      - goos: freebsd
        goarch: "386"

archives:
  - format_overrides:
      - goos: windows
        format: zip
    files:
      - README*
      - LICENSE*
      - manpages/*
      - completions/*

release:
  replace_existing_draft: true
  mode: "replace"

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ .Version }}-devel"

brews:
  - name: kms
    tap:
      owner: hanzokms
      name: homebrew-tap
    commit_author:
      name: "Hanzo AI"
      email: ai@hanzo.ai
    folder: Formula
    homepage: "https://kms.hanzo.ai"
    description: "The official Hanzo KMS CLI"
    install: |-
      bin.install "kms"
      bash_completion.install "completions/kms.bash" => "kms"
      zsh_completion.install "completions/kms.zsh" => "_kms"
      fish_completion.install "completions/kms.fish"
      man1.install "manpages/kms.1.gz"
  - name: "kms@{{.Version}}"
    tap:
      owner: hanzokms
      name: homebrew-tap
    commit_author:
      name: "Hanzo AI"
      email: ai@hanzo.ai
    folder: Formula
    homepage: "https://kms.hanzo.ai"
    description: "The official Hanzo KMS CLI"
    install: |-
      bin.install "kms"
      bash_completion.install "completions/kms.bash" => "kms"
      zsh_completion.install "completions/kms.zsh" => "_kms"
      fish_completion.install "completions/kms.fish"
      man1.install "manpages/kms.1.gz"

nfpms:
  - id: kms
    package_name: kms
    builds:
      - all-other-builds
    vendor: Hanzo AI Inc.
    homepage: https://kms.hanzo.ai/
    maintainer: Hanzo AI Inc.
    description: The official Hanzo KMS CLI
    license: MIT
    formats:
      - rpm
      - deb
      - apk
      - archlinux
    bindir: /usr/bin
    contents:
      - src: ./completions/kms.bash
        dst: /etc/bash_completion.d/kms
      - src: ./completions/kms.fish
        dst: /usr/share/fish/vendor_completions.d/kms.fish
      - src: ./completions/kms.zsh
        dst: /usr/share/zsh/site-functions/_kms
      - src: ./manpages/kms.1.gz
        dst: /usr/share/man/man1/kms.1.gz

scoop:
  name: kms
  bucket:
    owner: hanzokms
    name: scoop-kms
  commit_author:
    name: "Hanzo AI"
    email: ai@hanzo.ai
  homepage: "https://kms.hanzo.ai"
  description: "The official Hanzo KMS CLI"
  license: MIT

dockers:
  - dockerfile: docker/alpine
    goos: linux
    goarch: amd64
    use: buildx
    ids:
      - all-other-builds
    image_templates:
      - "hanzokms/cli:{{ .Major }}.{{ .Minor }}.{{ .Patch }}-amd64"
      - "hanzokms/cli:latest-amd64"
    build_flag_templates:
      - "--pull"
      - "--platform=linux/amd64"
  - dockerfile: docker/alpine
    goos: linux
    goarch: arm64
    use: buildx
    ids:
      - all-other-builds
    image_templates:
      - "hanzokms/cli:{{ .Major }}.{{ .Minor }}.{{ .Patch }}-arm64"
      - "hanzokms/cli:latest-arm64"
    build_flag_templates:
      - "--pull"
      - "--platform=linux/arm64"

docker_manifests:
  - name_template: "hanzokms/cli:{{ .Major }}.{{ .Minor }}.{{ .Patch }}"
    image_templates:
      - "hanzokms/cli:{{ .Major }}.{{ .Minor }}.{{ .Patch }}-amd64"
      - "hanzokms/cli:{{ .Major }}.{{ .Minor }}.{{ .Patch }}-arm64"
  - name_template: "hanzokms/cli:latest"
    image_templates:
      - "hanzokms/cli:latest-amd64"
      - "hanzokms/cli:latest-arm64"
